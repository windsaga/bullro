services:
  pipeline:
    build: .
    container_name: ai-blog-pipeline
    env_file: .env
    # ofelia가 job-exec으로 이 컨테이너 안에서 파이프라인을 실행하므로
    # 컨테이너는 항상 대기 상태로 유지 (CMD를 덮어씀)
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./data:/app/data
      - ./posts:/app/posts
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - blog-net

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: blog-scheduler
    depends_on:
      - pipeline
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scheduler.ini:/etc/ofelia/config.ini
    restart: unless-stopped
    networks:
      - blog-net

networks:
  blog-net:
